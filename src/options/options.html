<!DOCTYPE html>
<meta name=viewport content="width=device-width, initial-scale=1">
<title>YouTube LiveChat Flusher: Options</title>
<link rel=stylesheet href=options.css>
<form id=form>
	<section>
		<h1 data-i18n=manifestName>YouTube LiveChat Flusher</h1>
		<table>
			<tr>
				<th data-i18n=version>
				<td data-manifest=version>
			<tr>
				<th>GitHub
				<td><a href=https://github.com/ys-j/YoutubeLiveChatFlusher target=_blank>Home</a> / <a href=https://github.com/ys-j/YoutubeLiveChatFlusher/wiki target=_blank>Wiki</a>
			<tr>
				<th data-i18n=configFile>
				<td>
					<button id=btn-export type=button data-i18n=export></button>
					<button id=btn-import type=button data-i18n=import></button>
					<button id=btn-init type=button data-i18n=init></button>
		</table>
	</section>
	<section>
		<h2 data-i18n=commonSettings></h2>
		<dl>
			<dt data-i18n=notification>
			<dd>
				<label>
					<input type=radio name=notification value=0>
					<span data-i18n=disabled></span>
				</label>
				<label>
					<input type=radio name=notification value=1>
					<span data-i18n=enabled></span>
				</label>
			<dt data-i18n=loadingMode>
			<dd>
				<table>
					<tr>
						<th data-i18n=livestream>
						<td>
							<label>
								<input type=radio name=mode_livestream value=0>
								<span data-i18n=mode_option_chatframe_dependent></span>
							</label>
							<label>
								<input type=radio name=mode_livestream value=1>
								<span data-i18n=mode_option_chatframe_independent></span>
							</label>
					<tr>
						<th data-i18n=replay>
						<td>
							<label>
								<input type=radio name=mode_replay value=0>
								<span data-i18n=mode_option_chatframe_dependent></span>
							</label>
							<label>
								<input type=radio name=mode_replay value=1>
								<span data-i18n=mode_option_chatframe_independent></span>
							</label>
				</table>
				<dl class=note>
					<dt data-i18n=mode_option_chatframe_dependent>
					<dd>
						<ul>
							<li data-i18n=description_chatframe_dependent_1>
						</ul>
					<dt data-i18n=mode_option_chatframe_independent>
					<dd>
						<ul>
							<li data-i18n=description_chatframe_independent_1>
							<li data-i18n=description_chatframe_independent_2>
							<li data-i18n=description_chatframe_independent_3>
						</ul>
				</dl>
			<dt data-i18n=autostart>
			<dd>
				<label>
					<input type=radio name=autostart value=0>
					<span data-i18n=disabled></span>
				</label>
				<label>
					<input type=radio name=autostart value=1>
					<span data-i18n=enabled_onDependentMode></span>
				</label>
				<label>
					<input type=radio name=autostart value=2>
					<span data-i18n=enabled_always></span>
				</label>
			<dt data-i18n=hotkey>
			<dd>
				<table>
					<tr>
						<th>
							<label for=hotkey_layer_key data-i18n=hotkey_layer></label>
						<td>
							<input id=hotkey_layer_key name=hotkey_layer_key maxlength=1 size=2>
						<td>
							<label>
								<input type=checkbox name=hotkey_layer_alt>
								<span data-i18n=hotkey_alt></span>
							</label>
					<tr>
						<th>
							<label for=hotkey_panel_key data-i18n=hotkey_panel></label>
						<td>
							<input id=hotkey_panel_key name=hotkey_panel_key maxlength=1 size=2>
						<td>
							<label>
								<input type=checkbox name=hotkey_panel_alt>
								<span data-i18n=hotkey_alt></span>
							</label>
					<tr>
						<th>
							<label for=hotkey_pip_key data-i18n=hotkey_pip></label>
						<td>
							<input id=hotkey_pip_key name=hotkey_pip_key maxlength=1 size=2>
						<td>
							<label>
								<input type=checkbox name=hotkey_pip_alt>
								<span data-i18n=hotkey_alt></span>
							</label>
				</table>
			<dt data-i18n=message_pause>
			<dd>
				<label>
					<input type=radio name=message_pause value=0>
					<span data-i18n=disabled></span>
				</label>
				<label>
					<input type=radio name=message_pause value=1>
					<span data-i18n=enabled></span>
				</label>
			<dt class=only-firefox data-i18n=person_detection>
			<dd class=only-firefox>
				<label>
					<input type=radio name=person_detection value=0>
					<span data-i18n=disabled></span>
				</label>
				<label>
					<input type=radio name=person_detection value=1>
					<span data-i18n=enabled_wasm></span>
				</label>
				<label>
					<input type=radio name=person_detection value=2>
					<span data-i18n=enabled_gpu></span>
				</label>
		</dl>
	</section>
	<section>
		<h2 data-i18n=translation></h2>
		<dl>
			<dt data-i18n=translationBlacklist>
			<dd>
				<label>
					<input type=checkbox name=translation_blacklist_regexp>
					<span data-i18n=regexp></span>
				</label>
				<br>
				<textarea name=translation_blacklist rows=20 data-i18n-placeholder=placeholder_mutedWordsList></textarea>
			<dt data-i18n=translator>
			<dd>
				<select name=translation_translator>
					<option data-i18n=translator_internal value=internal>
					<option data-i18n=translator_external value=external>
				</select>
				<div><small data-i18n=translator_fallbackNote></small></div>
			<dt data-i18n=translation_request>
			<dd>
				<table>
					<col>
					<col class=max>
					<tr>
						<th data-i18n=translation_request_method>
						<td>
							<label>
								<input type=radio name=translation_method value=GET>GET
							</label>
							<label>
								<input type=radio name=translation_method value=POST>POST
							</label>
					<tr>
						<th>
							<label for=translation_url data-i18n=translation_request_url></label>
						<td>
							<div class=flex style="align-items:center;">
								<input type=url id=translation_url name=translation_url required>
								<button type=button id=btn-reset-translation data-i18n=init></button>
							</div>
					<tr data-when-method=POST>
						<th data-i18n=translation_request_bodyType>
						<td>
							<label>
								<input type=radio name=translation_bodyType value=OpenAI>
								<span data-i18n=translation_request_bodyType_OpenAICompatible></span>
							</label>
							<label>
								<input type=radio name=translation_bodyType value=custom>
								<span data-i18n=translation_request_bodyType_custom></span>
							</label>
					<tr data-when-method=POST>
						<th>
							<label for=translation_apiKey data-i18n=translation_request_apiKey></label>
						<td>
							<input id=translation_apiKey name=translation_apiKey>
					<tr data-when-method=POST>
						<th>
							<label for=translation_modelName data-i18n=translation_request_modelName></label>
						<td>
							<input id=translation_modelName name=translation_modelName>
				</table>
				<textarea name=translation_bodyContent rows=10 data-when-method=POST data-i18n-placeholder=translation_request_body></textarea>
			<dt data-i18n=translation_response>
			<dd>
				<table>
					<col>
					<col class=max>
					<tr>
						<th data-i18n=translation_response_style>
						<td>
							<label>
								<input type=radio name=translation_responseStyle value=Google>
								<span data-i18n=translation_response_style_Google></span>
							</label>
							<label>
								<input type=radio name=translation_responseStyle value=OpenAI>
								<span data-i18n=translation_response_style_OpenAI></span>
							</label>
				</table>
		</dl>
		<div>
			<div class=flex>
				<input type=search name=test_translation_text form=translation_test data-i18n-placeholder=placeholder_test_translation_text>
				<button id=btn-test-translation form=translation_test data-i18n=test_translation></button>
			</div>
			<pre><output name=test_translation_output form=translation_test></output></pre>
		</div>
	</section>
	<section>
		<button class=primary id=btn-save disabled data-i18n=save></button>
		<div><small id=status hidden data-i18n=warn_notSaved></small></div>
	</section>
</form>
<form id=translation_test></form>
<script src=options.js type=module></script>
